# =============================================================================
# Docker Compose - Project & Task Management API
# =============================================================================
# Services:
#   db   - PostgreSQL 16
#   app  - Node.js Express API
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ptask_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_task_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5442:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-project_task_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ptask_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptask_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en}
      SUPPORTED_LANGUAGES: ${SUPPORTED_LANGUAGES:-en,ar}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-project_task_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
    ports:
      - '3000:3000'
    networks:
      - ptask_net

volumes:
  db_data:

networks:
  ptask_net:
    driver: bridge
